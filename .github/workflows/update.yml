name: Update World Cup Calendar

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ICS
        run: |
          mkdir -p docs
          curl -L "https://www.skysports.com/calendars/football/fixtures/competitions/fifa-world-cup" -o docs/worldcup.ics

      - name: Commit updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/worldcup.ics

          git commit -m "Update calendar" || echo "No changes"

          git push